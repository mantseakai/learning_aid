<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Hub 🌟</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 30%, #a18cd1 70%, #fbc2eb 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; transform: scale(1); }
      to   { opacity: 0.9; transform: scale(1.4); }
    }

    .content { position: relative; z-index: 1; width: 100%; max-width: 860px; }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header .rocket { font-size: 64px; display: block; animation: bounce 1.6s infinite; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      color: white;
      text-shadow: 3px 4px 0 rgba(0,0,0,0.15);
      margin-top: 10px;
    }

    .header p {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.9);
      margin-top: 8px;
      font-weight: 600;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .child-card {
      background: white;
      border-radius: 28px;
      padding: 40px 30px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: 4px solid transparent;
    }

    .child-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 18px 40px rgba(0,0,0,0.2);
    }

    .child-card.emunah { border-color: #f857a6; }
    .child-card.tikky  { border-color: #4776e6; }

    .child-card .avatar {
      font-size: 88px;
      display: block;
      margin-bottom: 16px;
      animation: wiggle 2.5s infinite;
    }

    .child-card.tikky .avatar { animation-delay: 0.8s; }

    @keyframes wiggle {
      0%, 90%, 100% { transform: rotate(0deg); }
      93%           { transform: rotate(-8deg); }
      96%           { transform: rotate(8deg); }
    }

    .child-card h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      margin-bottom: 6px;
    }

    .child-card.emunah h2 { color: #f857a6; }
    .child-card.tikky  h2 { color: #4776e6; }

    .child-card .age {
      font-size: 1rem;
      font-weight: 700;
      color: #888;
      margin-bottom: 18px;
    }

    .child-card .lesson-count {
      display: inline-block;
      padding: 8px 22px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 800;
      color: white;
    }

    .child-card.emunah .lesson-count { background: linear-gradient(90deg,#f857a6,#ff5858); }
    .child-card.tikky  .lesson-count { background: linear-gradient(90deg,#4776e6,#8e54e9); }

    .child-card .go-btn {
      display: block;
      margin-top: 22px;
      padding: 14px 0;
      border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: white;
      border: none;
    }

    .child-card.emunah .go-btn { background: linear-gradient(90deg,#f857a6,#ff5858); }
    .child-card.tikky  .go-btn { background: linear-gradient(90deg,#4776e6,#8e54e9); }

    footer {
      margin-top: 60px;
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="content">
  <header class="header">
    <span class="rocket">🚀</span>
    <h1>Our Learning Hub</h1>
    <p>Choose your adventure below!</p>
  </header>

  <div class="cards">
    <a href="emunah/index.html" class="child-card emunah">
      <span class="avatar">👧</span>
      <h2>Emunah</h2>
      <p class="age">Age 8</p>
      <span class="lesson-count">4 Lessons Ready</span>
      <div class="go-btn">Let's Go! →</div>
    </a>

    <a href="tikky/index.html" class="child-card tikky">
      <span class="avatar">🧒</span>
      <h2>Tikky</h2>
      <p class="age">Age 5</p>
      <span class="lesson-count">8 Lessons Ready</span>
      <div class="go-btn">Let's Go! →</div>
    </a>
  </div>
</div>

<footer>Keep learning, keep growing! ⭐</footer>

<script>
  // Scatter random stars in the background
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 4 + 2;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      animation-delay:${Math.random()*3}s;
      animation-duration:${2+Math.random()*3}s;
    `;
    starsEl.appendChild(s);
  }
</script>
</body>
</html>
